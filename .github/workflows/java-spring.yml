# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-java-with-maven

# This workflow uses actions that are not certified by GitHub.
# They are provided by a third-party and are governed by
# separate terms of service, privacy policy, and support
# documentation.

name: Java CI with Maven

on:
  push:
    branches: [ "main", "feature/**" ]
    paths:
      - "HIF_FT_java/**"
  pull_request:
    branches: [ "main", "feature/**" ]
    paths:
      - "HIF_FT_java/**"

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up JDK
      uses: actions/setup-java@v5
      with:
        java-version: '25'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      working-directory: ./HIF_FT_java
      run: ./mvnw -B package --file pom.xml

    - name: Build ZIP for distribution
      run: |
        rm HIF_FT_java.zip
        zip -v -r HIF_FT_java.zip HIF_FT_java/ -x "HIF_FT_java/target" "HIF_FT_java/target/**" "HIF_FT_java/**/target/**" "HIF_FT_java/.idea" "HIF_FT_java/.idea/**" "HIF_FT_java/.git" "HIF_FT_java/.git/**"
